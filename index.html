<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect hints para fontes externas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin>
    <title>Credifacil - Sistema de Gestão de Empréstimos</title>
    <meta name="description" content="Sistema completo de gestão de empréstimos e cobranças" />
    <meta name="author" content="Credifacil" />

    <meta property="og:title" content="Credifacil" />
    <meta property="og:description" content="Sistema completo de gestão de empréstimos e cobranças" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Estilo inline para evitar tela preta durante carregamento -->
    <style>
      html, body, #root {
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }
      /* Fundo claro por padrão até CSS carregar */
      body {
        background-color: #f5f3ef;
      }
      /* Se preferir dark mode */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0a0a0a;
        }
      }
      /* Loading spinner */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: inherit;
        z-index: 9999;
      }
      #initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(200, 170, 80, 0.3);
        border-top-color: #c8a850;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Esconder loader quando React carregar */
      body.loaded #initial-loader {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <!-- Loader inicial visível até o React montar -->
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
